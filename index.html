<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Library</title>
    <link rel="stylesheet" href="./style.css">
    <script src="./javascript.js" defer></script>
</head>
<body>
    <div class="container">
        <div class="header-container">
            <div class="cardboard">
                <h1 class="title">My library</h1>
            </div>
            <button class="add" type="button">New Book</button>
        </div>
        <div class="shelf-container"></div>
        <dialog class="dialog">
            <p>New Book</p>
            <form action="#" name="book" method="get">
                <div class="authorDialog">
                    <label for="author">Author's Name:</label>
                    <input type="text" name="book" id="author">
                </div>
                <div class="bookDialog">
                    <label for="title">Book's Title:</label>
                    <input type="text" name="book" id="title">
                </div>
                <div class="numberDialog">
                    <label for="number">Number of Pages:</label>
                    <input type="number" name="book" id="number">
                </div>
                <div class="statusDialog">
                    <label for="status">Read Status</label>
                    <input type="checkbox" name="book" id="status" value="Read">
                </div>
                <div class="addBtn">
                    <button type="submit" id="addBtn">Add</button>
                </div>
            </form>
        </dialog>
    </div>
</body>
</html>
